services:
  - type: web
    name: promptcrafter
    env: static
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VITE_APP_PASSWORD
        sync: false